name: Update Booth Data

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write   

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: npm install
      - run: pip install -r requirements.txt

      - run: node scripts/fetch.js
      - run: python scripts/transform.py

      - name: commit
        run: |
          git diff --quiet || (
            git config --global user.name "bot"
            git config --global user.email "bot@example.com"
            git add .
            git commit -m "auto: update cw_332"
            git push
          )
